name: Frontend E2E

on:
  pull_request:
    paths:
      - '.github/workflows/frontend-e2e.yml'
      - 'backend/**'
      - 'frontend/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/frontend-e2e.yml'
      - 'backend/**'
      - 'frontend/**'

permissions:
  contents: read

jobs:
  frontend-e2e:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:4.4
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongo --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build backend
        working-directory: backend
        env:
          NODE_ENV: development
          PORT: 3000
          API_PREFIX: api
          MONGODB_URI: mongodb://127.0.0.1:27017/room-manager
          JWT_SECRET: test-jwt-secret
          JWT_EXPIRES_IN: 7d
          REFRESH_TOKEN_SECRET: test-refresh-secret
          REFRESH_TOKEN_EXPIRES_IN: 30d
          CORS_ORIGIN: http://127.0.0.1:5173
          LOG_LEVEL: error
        run: npm run build

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:3000/api
        run: npm run build

      - name: Install Playwright browser
        working-directory: frontend
        run: npm run test:e2e:install

      - name: Seed demo data
        working-directory: backend
        env:
          NODE_ENV: development
          PORT: 3000
          API_PREFIX: api
          MONGODB_URI: mongodb://127.0.0.1:27017/room-manager
          JWT_SECRET: test-jwt-secret
          JWT_EXPIRES_IN: 7d
          REFRESH_TOKEN_SECRET: test-refresh-secret
          REFRESH_TOKEN_EXPIRES_IN: 30d
          CORS_ORIGIN: http://127.0.0.1:5173
          LOG_LEVEL: error
        run: npm run seed

      - name: Start backend
        working-directory: backend
        env:
          NODE_ENV: development
          PORT: 3000
          API_PREFIX: api
          MONGODB_URI: mongodb://127.0.0.1:27017/room-manager
          JWT_SECRET: test-jwt-secret
          JWT_EXPIRES_IN: 7d
          REFRESH_TOKEN_SECRET: test-refresh-secret
          REFRESH_TOKEN_EXPIRES_IN: 30d
          CORS_ORIGIN: http://127.0.0.1:5173
          LOG_LEVEL: error
        run: |
          npm run start > ../backend-e2e.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/auth/login || true)
            if [ "$status" != "000" ]; then
              exit 0
            fi
            sleep 2
          done
          cat backend-e2e.log
          exit 1

      - name: Start frontend
        working-directory: frontend
        run: |
          npm run dev -- --host 127.0.0.1 > ../frontend-e2e.log 2>&1 &

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5173/login || true)
            if [ "$status" = "200" ]; then
              exit 0
            fi
            sleep 2
          done
          cat frontend-e2e.log
          exit 1

      - name: Run frontend e2e
        working-directory: frontend
        env:
          CI: true
          E2E_BASE_URL: http://127.0.0.1:5173
          E2E_API_BASE_URL: http://127.0.0.1:3000/api
          E2E_EMAIL: admin@example.com
          E2E_PASSWORD: password123
        run: npm run test:e2e

      - name: Upload e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-artifacts
          path: |
            backend-e2e.log
            frontend-e2e.log
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
